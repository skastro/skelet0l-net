<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Map — frame.w0rk</title>
<link rel="icon" href="/assets/favicon.svg">
<link rel="stylesheet" href="/css/frame.w0rk.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{background:radial-gradient(120% 90% at 50% -10%, #251B36 0%, var(--void) 55%, #140F1E 100%);
    color:var(--pearl);font-family:var(--body);font-size:18px;line-height:1.5;
    -webkit-font-smoothing:antialiased;padding:22px}
  .wrap{max-width:680px;margin:0 auto}

  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--air)}
  h1{font-family:var(--display);font-size:27px;letter-spacing:.06em;margin:.2em 0 .08em;color:var(--pearl)}
  .sub{font-style:italic;color:#C9B89A;margin-bottom:14px}

  /* ---- chart ---- */
  .chartwrap{display:flex;justify-content:center;margin:6px 0 4px}
  .spiral{width:100%;max-width:380px;height:auto}
  .legend{display:flex;justify-content:center;gap:20px;margin:2px 0 20px;
    font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted)}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .legend .h i{background:var(--pearl)}
  .legend .c i{background:transparent;border:1px solid var(--text-muted)}
  .legend .y i{background:var(--accent);box-shadow:0 0 6px var(--accent)}

  /* ---- bearing readout ---- */
  .bearing{border:1px solid var(--rule);border-radius:12px;padding:16px 18px;
    background:linear-gradient(180deg,rgba(221,201,165,.05),transparent)}
  .bearing .k{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--air)}
  .bearing .obj{font-family:var(--display);font-size:21px;color:var(--pearl);margin:5px 0 3px;line-height:1.2}
  .bearing .meta{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
  .bearing .stage{margin-top:11px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--pearl)}
  .bearing .stage b{color:var(--accent)}
  .bearing .stage .gloss{display:block;font-family:var(--body);font-style:italic;font-size:15px;
    letter-spacing:normal;text-transform:none;color:#C9B89A;margin-top:3px}
  .bearing.empty .obj{font-family:var(--body);font-style:italic;font-size:17px;color:#C9B89A}

  /* ---- four levers ---- */
  .levers{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}
  .lev{border:1px solid var(--rule);border-top-width:2px;border-radius:9px;padding:9px 11px;background:rgba(42,32,56,.3);opacity:.45;transition:opacity .25s}
  .lev.lit{opacity:1}
  .lev .ln{font-family:var(--display);font-size:14px;color:var(--c)}
  .lev .le{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-left:6px}

  /* ---- route ---- */
  .route{margin-top:18px}
  .route .rh{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
  .route ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px}
  .route li{display:flex;align-items:center;gap:10px;font-size:15px;color:var(--pearl)}
  .route .sym{flex:none;width:30px;height:24px;display:grid;place-items:center;font-family:var(--mono);font-size:12px;
    color:var(--pearl);border:1px solid var(--rule);border-radius:6px}
  .route .ro{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .route .rm{flex:none;font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;color:var(--text-muted)}
  .route .empty{font-style:italic;color:#C9B89A}

  .spiral .ping{transform-box:fill-box;transform-origin:center;
    animation:ping 2.4s ease-in-out infinite}
  @keyframes ping{0%,100%{transform:scale(.82);opacity:.9}50%{transform:scale(1.25);opacity:.3}}

  @media (prefers-reduced-motion: reduce){*{animation:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">frame.w0rk · the chart</div>
  <h1>The Map</h1>
  <div class="sub">harbors, crossings, routes — where the work sits</div>

  <div class="chartwrap"><div id="spiral"></div></div>
  <div class="legend">
    <span class="h"><i></i>harbor</span>
    <span class="c"><i></i>crossing</span>
    <span class="y"><i></i>you are here</span>
  </div>

  <div id="bearing" class="bearing empty">
    <div class="k">Active Bearing</div>
    <div class="obj">No bearing cast yet — cast a reading in The Compass.</div>
  </div>

  <div class="route">
    <div class="rh">Route · recent readings</div>
    <ul id="route"></ul>
  </div>
</div>

<script src="/js/navkit.js"></script>
<script>
(function(){
  "use strict";

  /* ---------- the nine-node spiral (Compendium V) ---------- */
  var NODES = [
    {sym:"0",  name:"Detritus",        kind:"harbor",   gloss:"the void; starting from nothing"},
    {sym:"½",  name:"Kindling",        kind:"crossing", gloss:"the first move out of zero; ignition"},
    {sym:"1",  name:"Oneness",         kind:"harbor",   gloss:"the undifferentiated whole"},
    {sym:"1½", name:"Reflection",      kind:"crossing", gloss:"something else exists outside the whole"},
    {sym:"2",  name:"Duality",         kind:"harbor",   gloss:"the first split — the given Situation"},
    {sym:"2½", name:"Reharmonization", kind:"crossing", gloss:"reconciling two patterns into one"},
    {sym:"3",  name:"Triplicity",      kind:"harbor",   gloss:"three parts, one leading"},
    {sym:"3½", name:"Eclipse",         kind:"crossing", gloss:"the last step before the four resolve"},
    {sym:"4",  name:"Quadruplicity",   kind:"harbor",   gloss:"all four elements held — then it turns"}
  ];
  /* filled-lever count → spiral node index */
  var LEVERS_TO_NODE = { 0:2, 1:3, 2:4, 3:6, 4:8 };

  var C=180, SIZE=360;
  function nodePos(i){
    var t=i/8;
    var ang=(-90 + i*67.5) * Math.PI/180;      /* start at top, ~1.5 turns */
    var r=26 + t*132;
    return { x:C + r*Math.cos(ang), y:C + r*Math.sin(ang) };
  }

  function spiralSVG(activeIdx){
    var pts=NODES.map(function(_,i){ return nodePos(i); });
    var svg='<svg class="spiral" viewBox="0 0 '+SIZE+' '+SIZE+'" role="img" '
      +'aria-label="The nine-node spiral: harbors zero through four with crossings between'
      +(activeIdx!=null?'. The active bearing sits at '+NODES[activeIdx].name:'')+'.">';

    /* spiral thread through the node centres */
    var d="M "+pts[0].x.toFixed(1)+" "+pts[0].y.toFixed(1);
    for(var i=1;i<pts.length;i++){
      var p0=pts[i-1], p1=pts[i];
      var mx=(p0.x+p1.x)/2, my=(p0.y+p1.y)/2;
      d+=" Q "+p0.x.toFixed(1)+" "+p0.y.toFixed(1)+" "+mx.toFixed(1)+" "+my.toFixed(1);
    }
    d+=" L "+pts[pts.length-1].x.toFixed(1)+" "+pts[pts.length-1].y.toFixed(1);
    svg+='<path d="'+d+'" fill="none" stroke="#3A3050" stroke-width="1.4"/>';

    /* the turn arrow at 4 → next 0 (the spiral climbs a level) */
    svg+='<circle cx="'+C+'" cy="'+C+'" r="4" fill="#2A2038" stroke="#3A3050"/>';

    NODES.forEach(function(n,i){
      var p=pts[i], active=(i===activeIdx);
      if(active){
        svg+='<circle class="ping" cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="13" '
          +'fill="none" stroke="#E663A0" stroke-width="1.4"/>';
      }
      if(n.kind==="harbor"){
        svg+='<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="7.5" '
          +'fill="'+(active?"#E663A0":"#DDC9A5")+'" stroke="#1A1525" stroke-width="1.4"/>';
      } else {
        svg+='<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="4.5" '
          +'fill="'+(active?"#E663A0":"#1A1525")+'" stroke="'+(active?"#E663A0":"#8C84A0")+'" '
          +'stroke-width="1.2" stroke-dasharray="'+(active?"0":"2 2")+'"/>';
      }
      /* stage symbol label, nudged outward from centre */
      var lr=Math.hypot(p.x-C,p.y-C)||1, ux=(p.x-C)/lr, uy=(p.y-C)/lr;
      var lx=p.x+ux*15, ly=p.y+uy*15+3;
      svg+='<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" text-anchor="middle" '
        +'fill="'+(active?"#F5E9D2":"#8C84A0")+'" font-family="Roboto Mono, monospace" '
        +'font-size="11" letter-spacing="1">'+n.sym+'</text>';
    });
    svg+='</svg>';
    return svg;
  }

  /* ---------- bearing → stage ---------- */
  var ELEMENTS = [
    {key:"pressure",    name:"Pressure",    el:"Fire",  hex:"#E663A0"},
    {key:"positioning", name:"Positioning", el:"Earth", hex:"#C5D86E"},
    {key:"awareness",   name:"Awareness",   el:"Air",   hex:"#B894D9"},
    {key:"skill",       name:"Skill",       el:"Water", hex:"#7A8FE0"}
  ];
  function filledCount(b){
    if(!b||!b.levers) return 0;
    var n=0; ELEMENTS.forEach(function(e){ var v=b.levers[e.key]; if(v&&String(v).trim()) n++; });
    return n;
  }
  function stageIndexOf(b){ return LEVERS_TO_NODE[filledCount(b)]; }

  function fmtDate(ts){ var d=new Date(ts);
    return d.toLocaleDateString(undefined,{month:"short",day:"numeric"})+" · "+
           d.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"}); }

  /* ---------- render ---------- */
  function render(){
    var b=NavKit.getCurrentBearing();
    var activeIdx = b ? stageIndexOf(b) : null;
    document.getElementById("spiral").innerHTML = spiralSVG(activeIdx);

    var el=document.getElementById("bearing");
    if(!b){
      el.className="bearing empty";
      el.innerHTML='<div class="k">Active Bearing</div>'
        +'<div class="obj">No bearing cast yet — cast a reading in The Compass.</div>';
    } else {
      var node=NODES[activeIdx];
      var levHtml=ELEMENTS.map(function(e){
        var lit=b.levers&&b.levers[e.key]&&String(b.levers[e.key]).trim();
        return '<div class="lev'+(lit?' lit':'')+'" style="--c:'+e.hex+';border-top-color:'+e.hex+'">'
          +'<span class="ln">'+e.name+'</span><span class="le">'+e.el+'</span></div>';
      }).join("");
      el.className="bearing";
      el.innerHTML='<div class="k">Active Bearing</div>'
        +'<div class="obj">'+(b.title||"Untitled bearing")+'</div>'
        +'<div class="meta">'+(b.domain?b.domain+" · ":"")+(b.jstamp||"")+" · "+fmtDate(b.ts)+'</div>'
        +'<div class="stage">Harbor <b>'+node.sym+' · '+node.name+'</b>'
          +'<span class="gloss">'+node.gloss+' — placed by '+filledCount(b)+' of 4 levers cast.</span></div>'
        +'<div class="levers">'+levHtml+'</div>';
    }

    /* route — recent readings as a sequence of stage stamps */
    var readings=NavKit.getReadings(), route=document.getElementById("route");
    if(!readings.length){
      route.innerHTML='<li class="empty">No route yet — readings will chart here as you cast them.</li>';
    } else {
      route.innerHTML=readings.slice(0,6).map(function(r){
        var cap={levers:{pressure:r.pressure,positioning:r.positioning,awareness:r.awareness,skill:r.skill}};
        var n=NODES[stageIndexOf(cap)];
        return '<li><span class="sym">'+n.sym+'</span>'
          +'<span class="ro">'+(r.objective||"Untitled")+'</span>'
          +'<span class="rm">'+n.name+'</span></li>';
      }).join("");
    }
  }

  render();
  NavKit.onChange(render);     /* live update when The Compass casts */
})();
</script>
</body>
</html>
