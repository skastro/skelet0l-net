<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Music — skele.t0l</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,600;1,600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/site.css">
  <style>
    section{padding:56px 80px}
    h3{font-family:var(--mono);font-size:13px;letter-spacing:1.2px;color:var(--gold);margin:0 0 18px}

    .card-row .w98{flex:1;min-width:0;max-width:400px}
    .ctas{margin-top:32px}
    @media (max-width:900px){
      section{padding:40px 20px}
      .card-row{flex-direction:column}
      .card-row .w98{max-width:none}

<body>
  <div id="site-header"></div>

    <div class="card-row">
      <div class="w98">
        <div class="titlebar"><span class="t">band.active</span><span class="btns"><i></i><i></i><i></i></span></div>

      </div>
      <div class="w98">
        <div class="titlebar"><span class="t">track.wip</span><span class="btns"><i></i><i></i><i></i></span></div>
        <div class="body">
          <span class="glyph">♩</span>

          <p class="desc">Current songwriting project.</p>
        </div>
      </div>
    </div>

    <div class="ctas">
      <a href="/about/" class="btn solid">LEARN MORE →</a>
      <a href="/" class="btn ghost">← HOME</a>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="/js/shell.js"></script>
</body>
</html>
